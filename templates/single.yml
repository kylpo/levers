# .levers.yml — declared policy levers for this project.
# Schema reference: docs/spec.md
# Validate:        `levers validate`
# Update triggers: project bootstrap, lifecycle transitions, deliberate
#                  pipeline reshape. Pair every flip with a DEC-P record
#                  in docs/DECISIONS.md.

# Active mode — temporary overlay on the declared values below. Empty = no mode.
# See `modes:` for definitions; flip with `levers mode set/clear` or via the TUI.
mode:

modes:
  prototype:
    label: Prototype
    description: Throwaway / spike work — testing & review off.
    overrides:
      test_strategy: manual_only
      manual_qa_capture: off
      ci_gate: none
      code_review: none
      doc_sync: none
      agent_auto_merge: all
      planning_horizon: just_in_time

  greenfield:
    label: Greenfield
    description: Net-new code, low ceremony, tests on, fast iteration.
    overrides:
      ci_gate: advisory
      code_review: inline
      doc_sync: inline
      planning_horizon: just_in_time

  brownfield:
    label: Brownfield
    description: Touching legacy code — full gates and reviews.
    overrides:
      ci_gate: gates_merge
      ci_retry: 1
      code_review: subagent
      doc_sync: subagent
      planning_horizon: phased

# --- Lifecycle & risk ---
lifecycle_stage: pre_launch

# --- Team & collaboration ---
team_mode: solo
review_cadence: async

# --- Planning & execution ---
planning_horizon: phased

# --- Quality ---
test_strategy: coverage_delta
manual_qa_capture: on
ci_gate: none
ci_retry: off
code_review: none
code_review_concurrency: series

# --- Release & delivery ---
release_model: batched_feature_scoped
branch_strategy: trunk_based
release_cadence: on_demand
versioning: semver
pr_merge_method: merge

# --- Automation ---
agent_auto_merge: low_risk_only
bug_intake: manual
ticket_claim: comment
agent_breadcrumb_commits: off
agent_breadcrumb_comments: off

# --- Documentation ---
changelog_style: curated
doc_sync: inline

# --- Workspace ---
workspace_isolation: branch
