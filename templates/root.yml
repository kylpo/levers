# .levers.yml (root) — repo-wide policy levers for this monorepo.
# Schema reference: docs/spec.md
# Validate:        `levers validate --role root`
# Update triggers: project bootstrap, lifecycle transitions, deliberate
#                  pipeline reshape. Pair every flip with a DEC-P record
#                  in the appropriate DECISIONS.md.
#
# This file declares REPO-SCOPED keys (how humans/agents operate on the
# whole repo). Per-package .levers.yml files at apps/*/.levers.yml,
# packages/*/.levers.yml etc. declare PACKAGE-SCOPED keys. EITHER-SCOPED
# keys default here and may be overridden per-package.

# Active mode — temporary overlay on the declared values below. Empty = no mode.
# Modes are root-only (no `mode:` / `modes:` in package files).
# Flip with `levers mode set/clear` or via the TUI.
mode:

modes:
  prototype:
    label: Prototype
    description: Throwaway / spike work — testing & review off.
    overrides:
      test_strategy: manual_only
      ci_gate: none
      code_review: none
      doc_sync: none
      agent_auto_merge: all
      planning_horizon: just_in_time

  greenfield:
    label: Greenfield
    description: Net-new code, low ceremony, tests on, fast iteration.
    overrides:
      ci_gate: advisory
      code_review: inline
      doc_sync: inline
      planning_horizon: just_in_time

  brownfield:
    label: Brownfield
    description: Touching legacy code — full gates and reviews.
    overrides:
      ci_gate: gates_merge
      ci_retry: 1
      code_review: subagent
      doc_sync: subagent
      planning_horizon: phased

# --- Team & collaboration (repo-scoped) ---
team_mode: solo
review_cadence: async

# --- Planning & execution (either-scoped default) ---
planning_horizon: phased

# --- Quality (either-scoped defaults) ---
test_strategy: coverage_delta
ci_gate: none
ci_retry: off
code_review: none
code_review_concurrency: series

# --- Release & delivery ---
branch_strategy: trunk_based     # repo-scoped
pr_merge_method: merge           # either-scoped default

# --- Automation ---
agent_auto_merge: low_risk_only   # either-scoped default
bug_intake: manual                # repo-scoped
ticket_claim: comment             # either-scoped default
agent_breadcrumb_commits: off     # either-scoped default
agent_breadcrumb_comments: off    # either-scoped default

# --- Documentation (either-scoped default) ---
doc_sync: inline

# --- Workspace (repo-scoped) ---
workspace_isolation: branch
