# .levers.yml (root) — repo-wide policy levers for this monorepo.
# Schema reference: docs/spec.md
# Validate:        `levers validate --role root`
# Update triggers: project bootstrap, lifecycle transitions, deliberate
#                  pipeline reshape. Pair every flip with a DEC-P record
#                  in the appropriate DECISIONS.md.
#
# This file declares REPO-SCOPED keys (how humans/agents operate on the
# whole repo). Per-package .levers.yml files at apps/*/.levers.yml,
# packages/*/.levers.yml etc. declare PACKAGE-SCOPED keys (lifecycle,
# release, versioning, and testing: test_automation / test_coverage).

# Active mode — temporary overlay on the declared values below. Empty = no mode.
# Modes are root-only (no `mode:` / `modes:` in package files).
# Flip with `levers mode set/clear` or via the TUI.
mode:

modes:
  prototype:
    label: Prototype
    description: Throwaway / spike work — testing & review off.
    overrides:
      test_automation: off
      test_coverage: off
      manual_qa_capture: off
      verification_strategy: none
      ci_gate: none
      code_review: none
      doc_sync: none
      agent_auto_merge: on
      planning_horizon: just_in_time

  greenfield:
    label: Greenfield
    description: Net-new code, low ceremony, tests on, fast iteration.
    overrides:
      test_automation: on
      test_coverage: off
      verification_strategy: per_feature
      ci_gate: advisory
      code_review: advisory
      doc_sync: advisory
      planning_horizon: just_in_time

  brownfield:
    label: Brownfield
    description: Touching legacy code — full gates and reviews.
    overrides:
      test_automation: on
      test_coverage: on
      verification_strategy: per_ticket
      ci_gate: gates_merge
      ci_retry: 1
      code_review: apply
      doc_sync: apply
      planning_horizon: phased

# --- Project context (repo-scoped) ---
repo_layout: monorepo
team_mode: solo
review_cadence: async

# --- Planning & intake ---
planning_horizon: phased
bug_intake: manual
ac_validation: off

# --- Testing & QA ---
# test_automation / test_coverage are package-scoped — declared in each
# package's .levers.yml, not here.
manual_qa_capture: on
verification_strategy: per_feature

# --- Verification ---
ac_graders: 1

# --- Automation ---
code_review: none
code_review_concurrency: series
ci_gate: none
ci_retry: off

# --- Version control & PRs ---
branch_strategy: trunk_based
pr_merge_method: merge
risk_classification: off
ticket_claim: comment
workspace_isolation: branch

# --- Agent behavior ---
agent_breadcrumb_commits: off
agent_breadcrumb_comments: off
agent_auto_merge: low_risk_only
agent_retro: off

# --- Documentation ---
doc_sync: advisory
