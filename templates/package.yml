# .levers.yml (package) — package-scoped policy levers.
# Schema reference: docs/spec.md
# Validate:        `levers validate --role package`
#
# Declares PACKAGE-SCOPED keys (lifecycle, release, QA discipline) and
# optionally overrides EITHER-SCOPED keys from the root .levers.yml.
# REPO-SCOPED keys (team_mode, branch_strategy, etc.) live at the root
# and must NOT appear here.

# --- Lifecycle & risk (package-scoped) ---
lifecycle_stage: pre_launch

# --- Quality (package-scoped) ---
manual_qa_capture: captured

# --- Release & delivery (package-scoped) ---
release_model: batched_feature_scoped
release_cadence: on_demand
versioning: semver

# --- Documentation (package-scoped) ---
changelog_style: curated

# --- Either-scoped overrides (optional — uncomment and set to override root) ---
# test_strategy: coverage_delta
# ci_gate: none
# code_review: none
# code_review_concurrency: series
# agent_auto_merge: low_risk_only
# agent_breadcrumb_commits: off
# agent_breadcrumb_comments: off
# planning_horizon: phased
# doc_sync: inline
# pr_merge_method: merge
