# .levers.yml (package) — package-scoped policy levers.
# Schema reference: docs/spec.md
# Validate:        `levers validate --role package`
#
# Declares PACKAGE-SCOPED keys (lifecycle, release, versioning) only.
# Every operational lever is REPO-SCOPED and lives at the root
# .levers.yml (team_mode, test_automation, ci_gate, etc.) — those must
# NOT appear here. (The `either` scope still exists for future use, but
# no lever currently uses it, so there are no per-package overrides.)

# --- Project context (package-scoped) ---
lifecycle_stage: pre_launch

# --- Release & versioning (package-scoped) ---
release_model: batched_feature_scoped
release_cadence: on_demand
versioning: semver
changelog_style: curated
