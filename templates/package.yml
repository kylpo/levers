# .levers.yml (package) — package-scoped policy levers.
# Schema reference: docs/spec.md
# Validate:        `levers validate --role package`
#
# Declares PACKAGE-SCOPED keys (lifecycle, release, versioning, testing).
# Repo-wide operational levers (team_mode, ci_gate, code_review, etc.)
# are REPO-SCOPED and live at the root .levers.yml — those must NOT
# appear here.

# --- Project context (package-scoped) ---
lifecycle_stage: pre_launch

# --- Testing & QA (package-scoped) ---
test_automation: on
test_coverage: on

# --- Release & versioning (package-scoped) ---
release_model: batched_feature_scoped
release_cadence: on_demand
versioning: semver
changelog_style: curated
