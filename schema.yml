# schema.yml — single source of truth for .levers.yml lever keys.
#
# Drives:
#   - `levers validate`        — enum + scope checks per role (single|root|package)
#   - `levers list-enums`      — grouped, scope-annotated output
#   - `levers merge-strictest`            — strictness ordering across packages
#   - `levers init`                       — required-key enforcement per role
#
# Scope:
#   repo      — declared only at the root .levers.yml
#   package   — declared only at per-package .levers.yml files
#   either    — may be declared at root (project-wide default) and/or
#               overridden per package
#
# Strictness (optional): values listed strictest → loosest. Used by
# `levers merge-strictest` to pick a single value when a change set spans
# multiple packages. Keys without a meaningful strictness ordering omit
# the field; `merge-strictest` fails if asked to merge them across
# packages with diverging values.
#
# Description / value_descriptions (optional): human-readable copy shown
# in the TUI help block. Surfaced read-only; no validation impact.

# Shape of a `modes:` entry in .levers.yml. Mode definitions themselves are
# project-owned data, not built into the tool; this only describes the fields
# `levers validate` will check.
mode_schema:
  required: [overrides]
  optional: [label, description]

categories:
  context:
    label: Project context
  planning:
    label: Planning & intake
  testing:
    label: Testing & QA
  verification:
    label: Verification
  automation:
    label: Automation
  vcs:
    label: Version control & PRs
  release:
    label: Release & versioning
  agent:
    label: Agent behavior
  documentation:
    label: Documentation

levers:
  # --- Project context ---
  lifecycle_stage:
    scope: package
    category: context
    values: [prototype, pre_launch, post_launch, mature]
    strictness: [mature, post_launch, pre_launch, prototype]
    description: Where this package sits in its lifecycle. Strictness ramps up as it approaches mature.
    value_descriptions:
      prototype: Throwaway experimentation. Minimal guardrails; expect breakage.
      pre_launch: Targeting a first release. Tightening up; some gates begin to apply.
      post_launch: Live, but still iterating fast. Stricter gates; real users at risk.
      mature: Stable, widely used. Strictest gates; changes carry the most weight.

  repo_layout:
    scope: repo
    category: context
    values: [single, monorepo]
    description: Whether this repo houses one package or many. Determines whether per-package .levers.yml overrides apply.
    value_descriptions:
      single: One package in the repo; the root .levers.yml is the whole story.
      monorepo: Many packages under one root; packages may override repo-wide defaults.

  team_mode:
    scope: repo
    category: context
    values: [solo, small_team, large_team]
    description: Size of the team working in this repo. Tunes how much explicit process is appropriate.
    value_descriptions:
      solo: One contributor. Minimal coordination overhead.
      small_team: A handful of contributors who can keep shared state in their heads.
      large_team: Many contributors; written-down process and conventions matter.

  review_cadence:
    scope: repo
    category: context
    values: [sync, async]
    description: Whether reviewers respond in near-real-time or on their own schedule.
    value_descriptions:
      sync: Reviews happen interactively (pairs, huddles, fast turnarounds).
      async: Reviewers respond when they can; expect hours-to-days latency.

  # --- Planning & intake ---
  planning_horizon:
    scope: repo
    category: planning
    values: [big_bang, phased, just_in_time]
    strictness: [big_bang, phased, just_in_time]
    description: How far ahead work is planned before execution begins.
    value_descriptions:
      big_bang: Whole project scoped up front, then executed end-to-end.
      phased: Planned in phases; each phase is scoped before its work starts.
      just_in_time: Minimal pre-planning; scope emerges as work proceeds.

  bug_intake:
    scope: repo
    category: planning
    values: [manual, funneled]
    description: How user-reported bugs enter the work queue.
    value_descriptions:
      manual: Bugs land as ad-hoc messages or issues; no fixed intake path.
      funneled: Bugs go through a defined intake (form, triage queue, etc.).

  ac_validation:
    scope: repo
    category: planning
    values: [off, on]
    strictness: [on, off]
    description: Whether each acceptance criterion is checked against the change before work is considered done.
    value_descriptions:
      off: Acceptance criteria are not explicitly validated; "looks done" is enough.
      on: Every acceptance criterion is verified against the post-change codebase before closing.

  # --- Testing & QA ---
  test_automation:
    scope: package
    category: testing
    values: [off, on]
    strictness: [on, off]
    description: Whether changes are covered by automated tests.
    value_descriptions:
      off: No automated tests; verification is manual.
      on: Changes ship with automated tests.

  test_coverage:
    scope: package
    category: testing
    values: [off, on]
    strictness: [on, off]
    depends_on:
      key: test_automation
      enabled_when: [on]
      disabled_default: off
    description: Whether coverage is tracked and defended on each change. Only relevant when tests are automated.
    value_descriptions:
      off: Coverage is not tracked; tests exist but the bar is "they pass."
      on: Every change keeps or improves coverage; regressions block merge.

  manual_qa_capture:
    scope: repo
    category: testing
    values: [off, on]
    strictness: [on, off]
    description: Whether manual QA sessions are recorded for future reference.
    value_descriptions:
      off: Manual QA is done but not preserved.
      on: Manual QA results are written down (notes, screenshots, transcripts).

  verification_strategy:
    scope: repo
    category: testing
    values: [none, per_ticket, per_feature, per_epic]
    strictness: [per_ticket, per_feature, per_epic, none]
    description: At what granularity human verification happens before work is considered done.
    value_descriptions:
      none: No explicit verification step; work is done when the code lands.
      per_ticket: Every ticket is verified before it closes.
      per_feature: Verification happens once per feature, after its tickets land.
      per_epic: Verification happens once per epic, after its features land.

  # --- Verification ---
  ac_graders:
    scope: repo
    category: verification
    values: [1, 2, 3, 4, 5]
    strictness: [5, 4, 3, 2, 1]
    description: How many independent graders validate each acceptance criterion.
    value_descriptions:
      1: A single grader validates each acceptance criterion.
      2: Two independent graders validate each acceptance criterion.
      3: Three independent graders validate each acceptance criterion.
      4: Four independent graders validate each acceptance criterion.
      5: Five independent graders validate each acceptance criterion.

  # --- Automation ---
  code_review:
    scope: repo
    category: automation
    values: [none, advisory, apply]
    strictness: [apply, advisory, none]
    description: Who reviews code before it can merge.
    value_descriptions:
      none: Author merges their own changes; no review step.
      advisory: Changes are reviewed; findings are surfaced as comments and don't block merge.
      apply: Changes are reviewed and fixes are applied directly; review can block merge.

  code_review_concurrency:
    scope: repo
    category: automation
    values: [series, parallel]
    strictness: [series, parallel]
    description: Whether review happens after authoring or alongside it.
    value_descriptions:
      series: Author finishes, then review begins.
      parallel: Review runs alongside ongoing authoring on the same PR.

  ci_gate:
    scope: repo
    category: automation
    values: [none, advisory, gates_merge]
    strictness: [gates_merge, advisory, none]
    description: How CI failures affect merging.
    value_descriptions:
      none: No CI checks run on PRs.
      advisory: CI runs and reports, but failures do not block merging.
      gates_merge: Failing CI blocks merge.

  ci_retry:
    scope: repo
    category: automation
    values: [off, 1, 2, 3, until_fixed]
    strictness: [off, 1, 2, 3, until_fixed]
    depends_on:
      key: ci_gate
      enabled_when: [gates_merge]
      disabled_default: off
    description: Auto-retry strategy for flaky CI runs. Only relevant when CI gates merging.
    value_descriptions:
      off: Failures stay failed; no retries.
      1: Retry the failing job up to once before declaring failure.
      2: Retry the failing job up to twice before declaring failure.
      3: Retry the failing job up to three times before declaring failure.
      until_fixed: Keep retrying until the run passes. Use sparingly — masks real flake.

  # --- Version control & PRs ---
  branch_strategy:
    scope: repo
    category: vcs
    values: [trunk_based, gitflow, feature_branches_plus_trunk]
    description: Long-lived branch structure for the repo.
    value_descriptions:
      trunk_based: One main branch; short-lived feature branches merge back fast.
      gitflow: Long-lived develop/main branches with release and hotfix branches.
      feature_branches_plus_trunk: Trunk plus longer-lived feature branches that integrate periodically.

  pr_merge_method:
    scope: repo
    category: vcs
    values: [merge, squash, rebase]
    strictness: [merge, rebase, squash]
    description: How PRs land on the target branch.
    value_descriptions:
      merge: Merge commit preserves the full branch history.
      squash: Collapse the PR to one commit on the target.
      rebase: Replay the PR's commits onto the target; no merge commit.

  risk_classification:
    scope: repo
    category: vcs
    values: [off, on]
    strictness: [on, off]
    description: Whether changes are analyzed and labelled by risk level (low-risk / high-risk).
    value_descriptions:
      off: Changes are not risk-labelled.
      on: Each change is analyzed and tagged low-risk or high-risk.

  ticket_claim:
    scope: repo
    category: vcs
    values: [comment, empty_pr]
    description: How an agent signals it has started working on a ticket.
    value_descriptions:
      comment: Drop a claim comment on the ticket.
      empty_pr: Open an empty PR linked to the ticket.

  workspace_isolation:
    scope: repo
    category: vcs
    values: [worktree, branch, none]
    description: How concurrent work-in-progress is isolated.
    value_descriptions:
      worktree: Each task runs in its own git worktree.
      branch: Each task runs on its own branch in a shared checkout.
      none: Everyone shares the same working tree.

  # --- Release & versioning ---
  release_model:
    scope: package
    category: release
    values: [continuous, batched_timeline, batched_feature_scoped, release_branch]
    strictness: [release_branch, batched_timeline, batched_feature_scoped, continuous]
    description: Granularity and discipline of releases for this package.
    value_descriptions:
      continuous: Every merge can ship; trunk is always releasable.
      batched_timeline: Release on a fixed schedule, bundling whatever is ready.
      batched_feature_scoped: Release when a defined set of features is ready.
      release_branch: Cut a release branch, stabilize on it, ship from it.

  release_cadence:
    scope: package
    category: release
    values: [on_demand, weekly, biweekly, monthly, milestone]
    description: How often releases ship.
    value_descriptions:
      on_demand: Ship whenever something is ready.
      weekly: Ship on a fixed weekly cadence.
      biweekly: Ship on a fixed two-week cadence.
      monthly: Ship on a fixed monthly cadence.
      milestone: Ship when a milestone's scope is complete; no calendar cadence.

  versioning:
    scope: package
    category: release
    values: [semver, calver, adhoc]
    description: Versioning scheme for releases.
    value_descriptions:
      semver: MAJOR.MINOR.PATCH; bumps follow semantic-versioning compatibility rules.
      calver: Date-based version (e.g., 2026.05.26).
      adhoc: No formal versioning scheme.

  changelog_style:
    scope: package
    category: release
    values: [commit_log, curated]
    description: How the changelog is produced.
    value_descriptions:
      commit_log: The git log is the changelog; no curation step.
      curated: A human curates a release-readable changelog.

  # --- Agent behavior ---
  agent_breadcrumb_commits:
    scope: repo
    category: agent
    values: [off, on]
    strictness: [on, off]
    description: Whether agents leave breadcrumb commits as they work.
    value_descriptions:
      off: Agents commit only meaningful diffs.
      on: Agents commit progress markers — useful for resumability and review.

  agent_breadcrumb_comments:
    scope: repo
    category: agent
    values: [off, on]
    strictness: [on, off]
    description: Whether agents post status comments as they work.
    value_descriptions:
      off: Agents stay quiet on the PR until they are done.
      on: Agents post progress comments — useful for observability.

  agent_auto_merge:
    scope: repo
    category: agent
    values: [off, low_risk_only, on]
    strictness: [off, low_risk_only, on]
    description: Whether agent-authored PRs may merge themselves.
    value_descriptions:
      off: Agents never auto-merge; a human always clicks merge.
      low_risk_only: Agents may auto-merge low-risk changes (e.g., dep bumps, doc-only).
      on: Agents auto-merge anything that passes gates.

  agent_retro:
    scope: repo
    category: agent
    values: [off, on]
    strictness: [on, off]
    description: Whether agents run a retrospective on their work session.
    value_descriptions:
      off: Agents finish without a retrospective step.
      on: Agents run a retrospective to surface friction and improvements after a session.

  # --- Documentation ---
  doc_sync:
    scope: repo
    category: documentation
    values: [none, advisory, apply]
    strictness: [apply, advisory, none]
    description: Who keeps documentation in sync with code changes.
    value_descriptions:
      none: Docs drift freely; nobody is responsible for keeping them current.
      advisory: Doc drift is flagged for humans to act on; nothing changes automatically.
      apply: Doc updates are applied directly to keep docs in sync; can block merge on drift.
